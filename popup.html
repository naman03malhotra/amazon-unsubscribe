<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS Bulk Canceller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
    }
    .header {
      background: linear-gradient(135deg, #ff9900, #e88600);
      padding: 16px 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #0f1117;
      letter-spacing: -0.3px;
    }
    .header p {
      font-size: 11px;
      color: #232f3e;
      margin-top: 4px;
    }
    .content { padding: 16px 20px; }
    .status-bar {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #484f58;
      flex-shrink: 0;
    }
    .status-dot.active { background: #3fb950; }
    .status-dot.working { background: #d29922; animation: pulse 1s infinite; }
    .status-dot.error { background: #f85149; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { font-size: 12px; color: #8b949e; }
    .status-text strong { color: #e1e4e8; font-weight: 600; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-num {
      font-size: 22px;
      font-weight: 700;
      color: #ff9900;
    }
    .stat-label {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-bottom: 8px;
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-scan {
      background: #238636;
      color: #fff;
    }
    .btn-scan:hover:not(:disabled) { background: #2ea043; }
    .btn-cancel-all {
      background: #da3633;
      color: #fff;
    }
    .btn-cancel-all:hover:not(:disabled) { background: #f85149; }
    .btn-cancel-selected {
      background: #ff9900;
      color: #0f1117;
    }
    .btn-cancel-selected:hover:not(:disabled) { background: #ffad33; }
    .btn-abort {
      background: #484f58;
      color: #e1e4e8;
    }
    .btn-abort:hover:not(:disabled) { background: #6e7681; }
    .sub-list {
      max-height: 280px;
      overflow-y: auto;
      margin: 14px 0;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
    .sub-list::-webkit-scrollbar { width: 6px; }
    .sub-list::-webkit-scrollbar-track { background: #161b22; }
    .sub-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    .sub-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid #21262d;
      transition: background 0.1s;
    }
    .sub-item:last-child { border-bottom: none; }
    .sub-item:hover { background: #161b22; }
    .sub-item input[type="checkbox"] {
      accent-color: #ff9900;
      width: 16px; height: 16px;
      flex-shrink: 0;
    }
    .sub-item-info { flex: 1; min-width: 0; }
    .sub-item-name {
      font-size: 12px;
      color: #e1e4e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sub-item-meta {
      font-size: 10px;
      color: #8b949e;
      margin-top: 2px;
    }
    .sub-item-status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      flex-shrink: 0;
      font-weight: 600;
    }
    .sub-item-status.pending { background: #30363d; color: #8b949e; }
    .sub-item-status.cancelling { background: #3d2800; color: #d29922; }
    .sub-item-status.done { background: #0d2818; color: #3fb950; }
    .sub-item-status.failed { background: #2d0b0b; color: #f85149; }
    .select-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .select-bar label {
      font-size: 12px;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .select-bar label input { accent-color: #ff9900; }
    .select-count { font-size: 11px; color: #ff9900; font-weight: 600; }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #30363d;
      border-radius: 2px;
      margin: 10px 0;
      overflow: hidden;
      display: none;
    }
    .progress-bar.visible { display: block; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff9900, #ffad33);
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .log {
      max-height: 100px;
      overflow-y: auto;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 10px;
      color: #8b949e;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 8px;
      margin-top: 10px;
      display: none;
    }
    .log.visible { display: block; }
    .log-entry { padding: 1px 0; }
    .log-entry.success { color: #3fb950; }
    .log-entry.error { color: #f85149; }
    .log-entry.info { color: #d29922; }
    .footer {
      text-align: center;
      padding: 10px;
      font-size: 10px;
      color: #484f58;
      border-top: 1px solid #21262d;
    }
    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #484f58;
    }
    .empty-state svg { margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>SNS Bulk Canceller</h1>
    <p>Amazon India Subscribe &amp; Save Manager</p>
  </div>

  <div class="content">
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Click <strong>Scan</strong> to detect subscriptions</div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-num" id="totalCount">-</div>
        <div class="stat-label">Found</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="selectedCount">0</div>
        <div class="stat-label">Selected</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="cancelledCount">0</div>
        <div class="stat-label">Cancelled</div>
      </div>
    </div>

    <button class="btn btn-scan" id="btnScan">Scan Subscriptions</button>

    <div id="listContainer" style="display:none;">
      <div class="select-bar">
        <label><input type="checkbox" id="selectAll"> Select All</label>
        <span class="select-count" id="selectCountText">0 selected</span>
      </div>
      <div class="sub-list" id="subList"></div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <button class="btn btn-cancel-selected" id="btnCancelSelected" disabled>Cancel Selected</button>
      <button class="btn btn-cancel-all" id="btnCancelAll" disabled>Cancel ALL Subscriptions</button>
      <button class="btn btn-abort" id="btnAbort" style="display:none;">Abort</button>
    </div>

    <div class="log" id="logBox"></div>
  </div>

  <div class="footer">Use responsibly. Cancellations cannot be undone.</div>

  <script src="js/popup.js"></script>
</body>
</html>
